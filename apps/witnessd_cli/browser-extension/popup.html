<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Witnessd</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="icons/icon-32.png" alt="" width="24" height="24">
        <h1>Witnessd</h1>
      </div>
      <span id="connection-badge" class="badge disconnected">Disconnected</span>
    </header>

    <!-- Status Section -->
    <section id="status-section">
      <div id="no-session" class="card">
        <p class="muted">No active witnessing session</p>
        <p class="hint">Navigate to a supported document editor to begin.</p>
      </div>

      <div id="active-session" class="card" hidden>
        <div class="session-header">
          <span class="dot active"></span>
          <span id="session-title" class="session-title">Untitled</span>
        </div>
        <div class="stats">
          <div class="stat">
            <span class="stat-value" id="checkpoint-count">0</span>
            <span class="stat-label">Checkpoints</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="char-count">0</span>
            <span class="stat-label">Characters</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls">
      <button id="btn-start" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4 2l10 6-10 6V2z"/>
        </svg>
        Start Witnessing
      </button>
      <button id="btn-stop" class="btn btn-danger" hidden>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <rect x="3" y="3" width="10" height="10" rx="1"/>
        </svg>
        Stop Witnessing
      </button>
    </section>

    <!-- System Status -->
    <section class="system-status">
      <div class="status-row">
        <span class="status-label">Total files tracked</span>
        <span class="status-value" id="total-files">--</span>
      </div>
      <div class="status-row">
        <span class="status-label">Total checkpoints</span>
        <span class="status-value" id="total-checkpoints">--</span>
      </div>
    </section>

    <!-- Error Display -->
    <div id="error-banner" class="error-banner" hidden>
      <span id="error-message"></span>
      <button id="error-dismiss" class="btn-dismiss" aria-label="Dismiss">&times;</button>
    </div>

    <footer>
      <a href="#" id="open-options">Settings</a>
      <span class="version" id="ext-version"></span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
