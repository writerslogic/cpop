<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPoE Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>CPoE Settings</h1>

    <section class="setting-group">
      <h2>General</h2>
      <label class="setting">
        <span class="setting-info">
          <span class="setting-label">Auto-witness on supported sites</span>
          <span class="setting-description">Automatically start witnessing when you open a supported document editor</span>
        </span>
        <input type="checkbox" id="auto-witness">
      </label>

      <label class="setting">
        <span class="setting-info">
          <span class="setting-label">Checkpoint interval (seconds)</span>
          <span class="setting-description">How often to create automatic checkpoints during editing</span>
        </span>
        <input type="number" id="checkpoint-interval" min="10" max="300" step="5" value="30">
      </label>
    </section>

    <section class="setting-group">
      <h2>Evidence</h2>
      <label class="setting">
        <span class="setting-info">
          <span class="setting-label">Content tier</span>
          <span class="setting-description">Level of forensic detail captured per checkpoint</span>
        </span>
        <select id="content-tier">
          <option value="core">Core (hash chain + SWF proofs)</option>
          <option value="enhanced" selected>Enhanced (+ behavioral entropy)</option>
          <option value="maximum">Maximum (+ entangled MACs)</option>
        </select>
      </label>

      <label class="setting">
        <span class="setting-info">
          <span class="setting-label">Capture keystroke timing</span>
          <span class="setting-description">Record inter-key intervals for SWF jitter binding (timing only, never key values)</span>
        </span>
        <input type="checkbox" id="capture-jitter" checked>
      </label>
    </section>

    <section class="setting-group">
      <h2>Supported Sites</h2>
      <div class="site-list">
        <label class="site-toggle">
          <input type="checkbox" checked data-site="google-docs"> Google Docs
        </label>
        <label class="site-toggle">
          <input type="checkbox" checked data-site="overleaf"> Overleaf
        </label>
        <label class="site-toggle">
          <input type="checkbox" checked data-site="medium"> Medium
        </label>
        <label class="site-toggle">
          <input type="checkbox" checked data-site="notion"> Notion
        </label>
      </div>
    </section>

    <div class="actions">
      <button id="btn-save" class="btn btn-primary">Save Settings</button>
      <span id="save-status" class="save-status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
