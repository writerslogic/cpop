# linuxdeploy configuration for CPoE AppImage
# https://github.com/linuxdeploy/linuxdeploy

appimage:
  name: writerslogic
  version: "1.0.0"
  arch: x86_64
  update-information: gh-releases-zsync|writerslogic|writerslogic|latest|writerslogic-*x86_64.AppImage.zsync

# Files to include
files:
  - source: usr/bin/cpoe
    destination: usr/bin/cpoe
  - source: usr/bin/witnessctl
    destination: usr/bin/witnessctl
  - source: usr/bin/cpoe-ibus
    destination: usr/bin/cpoe-ibus
  - source: usr/share/applications/cpoe.desktop
    destination: usr/share/applications/cpoe.desktop
  - source: usr/share/icons/hicolor/256x256/apps/cpoe.png
    destination: usr/share/icons/hicolor/256x256/apps/cpoe.png
  - source: usr/share/metainfo/cpoe.appdata.xml
    destination: usr/share/metainfo/cpoe.appdata.xml

# Runtime configuration
runtime:
  # Embed update information for AppImageUpdate
  update-information: true

# Desktop integration
desktop-integration:
  enable: true

# Environment variables
environment:
  WRITERSLOGIC_APPIMAGE: "1"
